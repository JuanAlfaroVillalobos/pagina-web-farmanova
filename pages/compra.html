<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - FarmaNova</title>
    <link rel="icon" type="image/jpeg" href="Imagenes/LogoTipo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        
        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("../Imagenes/ImagenFondo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .btn-volver {
            align-self: flex-start;
            max-width: 900px;
            width: 100%;
            margin: 0 auto 15px auto; 
        }

        .btn-volver a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #FFFFFF;
            background: rgba(20, 77, 108, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-volver a:hover {
            background: #20A477;
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(32, 164, 119, 0.4);
        }

        .checkout-container {
            background: rgba(255, 255, 255, 0.98);
            max-width: 900px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            overflow: hidden;
            animation: entradaSoft 0.6s ease-out;
        }

        @keyframes entradaSoft {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .resumen-producto {
            background: #144D6C;
            color: white;
            flex: 1;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .logo-compra {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #F2C278;
        }

        /* Contenedor dinámico con scroll para los productos */
        #resumen-dinamico {
            width: 100%;
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        /* Estilo para la barrita de scroll del resumen */
        #resumen-dinamico::-webkit-scrollbar { width: 6px; }
        #resumen-dinamico::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        #resumen-dinamico::-webkit-scrollbar-thumb { background: #F2C278; border-radius: 10px; }

        .precio-checkout {
            font-size: 1.8rem;
            font-weight: 700;
            color: #F2C278;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px dashed rgba(242, 194, 120, 0.5);
            margin-top: auto;
        }

        .formulario-checkout {
            flex: 1.3;
            padding: 40px;
            max-height: 85vh;
            overflow-y: auto;
        }

        h2 {
            color: #144D6C;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .seccion-titulo {
            font-size: 1rem;
            font-weight: 600;
            color: #20A477;
            margin: 20px 0 12px 0;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .grupo-input {
            margin-bottom: 15px;
            position: relative;
        }

        .grupo-input i {
            position: absolute;
            left: 12px;
            top: 38px;
            color: #a0aec0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 10px 10px 10px 38px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #334155;
            background: #f8fafc;
        }

        input:focus { border-color: #20A477; outline: none; }
        input:focus + i { color: #20A477; }

        .grid-pagos {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tarjeta-pago {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .tarjeta-pago:hover { border-color: #20A477; background: #f0fff8; }

        .info-pago {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #334155;
        }

        .tarjeta-pago input[type="radio"] { accent-color: #20A477; width: 18px; height: 18px; cursor: pointer; }

        .tarjeta-pago:has(input[type="radio"]:checked) {
            border-color: #20A477;
            background: #e6fcf5;
        }

        .btn-pagar {
            width: 100%;
            padding: 14px;
            background: #20A477;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-pagar:hover { background: #144D6C; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .checkout-container { flex-direction: column; }
            .resumen-producto { padding: 30px 20px; }
            .formulario-checkout { padding: 30px 20px; overflow-y: visible; }
        }
    </style>
</head>

<body>

    <div class="btn-volver">
    <a href="catalogo.html"><i class="fa-solid fa-arrow-left"></i> Volver al Catálogo</a>
    </div>

    <div class="checkout-container">
        
        <div class="resumen-producto">
            <div class="logo-compra"><i class="fa-solid fa-leaf"></i> FarmaNova</div>
            
            <div id="resumen-dinamico">
                </div>
            
            <div class="precio-checkout" id="total-dinamico">
                <i class="fa-solid fa-tag"></i> Total: S/ 0.00
            </div>
        </div>

        <div class="formulario-checkout">
            <h2><i class="fa-solid fa-bag-shopping" style="color: #20A477;"></i> Detalle de tu pedido</h2>
            
            <form action="#" method="POST" onsubmit="alert('¡Pedido realizado con éxito en FarmaNova!'); localStorage.removeItem('carritoFarmaNova'); window.location.href='../index.html'; return false;">
                
                <div class="seccion-titulo">Datos del Cliente</div>
                
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="grupo-input">
                    <label for="dni">Documento de Identidad</label>
                    <input type="text" id="dni" placeholder="Ej. 74589632" required>
                    <i class="fa-solid fa-id-card"></i>
                </div>

                <div class="grupo-input">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="juan.perez@correo.com" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="grupo-input">
                    <label for="telefono">Número de Celular</label>
                    <input type="tel" id="telefono" placeholder="Ej. 999 999 999" required>
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div class="grupo-input">
                    <label for="direccion">Dirección de Envío</label>
                    <input type="text" id="direccion" placeholder="Av. Larco 123, Trujillo" required>
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <div class="seccion-titulo">Método de Pago</div>
                
                <div class="grid-pagos">
                    <label class="tarjeta-pago">
                        <div class="info-pago">
                            <i class="fa-solid fa-credit-card" style="color: #144D6C;"></i>
                            <span>Tarjeta de Crédito / Débito</span>
                        </div>
                        <input type="radio" name="pago" value="tarjeta" checked>
                    </label>

                    <label class="tarjeta-pago">
                        <div class="info-pago">
                            <i class="fa-solid fa-qrcode" style="color: #20A477;"></i>
                            <span>Yape / Plin</span>
                        </div>
                        <input type="radio" name="pago" value="billetera">
                    </label>

                    <label class="tarjeta-pago">
                        <div class="info-pago">
                            <i class="fa-solid fa-money-bill-wave" style="color: #28a745;"></i>
                            <span>Pago Contra Entrega</span>
                        </div>
                        <input type="radio" name="pago" value="efectivo">
                    </label>
                </div>

                <div id="qrYapePlin" class="qr-yape-box">
                    <p style="font-weight:600; color:#144D6C; margin-bottom:10px;"><i class="fa-solid fa-mobile-screen-button"></i> Escanea para pagar con Yape o Plin</p>
                    <img id="qrImagenYape" src="" alt="Código QR Yape/Plin">
                    <p style="font-size:0.85rem; color:#555; margin-top:10px;">FarmaNova S.A.C. · Nro. asociado: 999 888 777</p>
                    <p style="font-size:0.8rem; color:#888;">Después de pagar, envía la captura de tu comprobante a nuestro WhatsApp de atención.</p>
                </div>

                <button type="submit" class="btn-pagar" id="btnProcesar">
                    <i class="fa-solid fa-lock"></i> Procesar Pedido Seguro
                </button>
            </form>
        </div>

    </div>

    <script>
        class CheckoutFarmaNova {
            constructor() {
                this.cart = JSON.parse(localStorage.getItem('carritoFarmaNova')) || [];
                this.init();
            }
            init() {
                const container = document.getElementById('resumen-dinamico');
                const totalElement = document.getElementById('total-dinamico');
                const btn = document.getElementById('btnProcesar');

                if (this.cart.length === 0) {
                    container.innerHTML = `
                        <img src="../Imagenes/LogoTipo.jpeg" style="width:120px; border-radius:15px; margin-bottom:15px;">
                        <h3 style="color:#F2C278;">Tu carrito está vacío 😔</h3>
                        <p style="font-size:0.9rem; color:#cbd5e1;">Regresa al catálogo para añadir productos.</p>`;
                    totalElement.innerHTML = `<i class="fa-solid fa-tag"></i> Total: S/ 0.00`;
                    btn.disabled = true;
                    btn.style.background = '#ccc';
                    btn.style.cursor = 'not-allowed';
                } else {
                    let total = 0;
                    let html = '';
                    this.cart.forEach(item => {
                        total += item.precio * item.cantidad;
                        const imgSrc = item.img && item.img.trim() ? item.img.replace(/^Imagenes\//, '../Imagenes/') : '../Imagenes/LogoTipo.jpeg';
                        html += `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; text-align:left;">
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <img src="${imgSrc}" style="width:45px; height:45px; object-fit:contain; border-radius:5px; background:white; padding:2px;" onerror="this.onerror=null; this.src='../Imagenes/LogoTipo.jpeg';">
                                    <div>
                                        <div style="font-weight:bold; font-size:0.85rem; line-height:1.2;">${item.nombre}</div>
                                        <div style="font-size:0.8rem; color:#cbd5e1;">Cant: ${item.cantidad}</div>
                                    </div>
                                </div>
                                <div style="font-weight:bold; color:#F2C278; font-size:0.95rem;">S/ ${(item.precio * item.cantidad).toFixed(2)}</div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                    totalElement.innerHTML = `<i class="fa-solid fa-tag"></i> Total: S/ ${total.toFixed(2)}`;
                }

                this.initPagoYapePlin();
            }

            // Muestra/oculta el QR de Yape/Plin según el método de pago elegido,
            // y genera el código con el monto exacto del pedido.
            initPagoYapePlin() {
                const radios = document.querySelectorAll('input[name="pago"]');
                const qrBox = document.getElementById('qrYapePlin');
                const qrImg = document.getElementById('qrImagenYape');
                if (!radios.length || !qrBox || !qrImg) return;

                const total = this.cart.reduce((acc, item) => acc + item.precio * item.cantidad, 0);

                const actualizarQR = () => {
                    const datosQR = `FarmaNova S.A.C.|Yape-Plin|Monto:S/${total.toFixed(2)}|Cel:999888777`;
                    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(datosQR)}`;
                };

                radios.forEach(radio => {
                    radio.addEventListener('change', () => {
                        if (radio.checked && radio.value === 'billetera') {
                            actualizarQR();
                            qrBox.style.display = 'block';
                        } else if (radio.checked) {
                            qrBox.style.display = 'none';
                        }
                    });
                });
            }
        }
        new CheckoutFarmaNova();
    </script>
</body>

</html>
